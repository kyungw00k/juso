<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>juso</title>
<style>
  body { background: #0d1117; color: #c9d1d9; font-family: system-ui; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
  a { color: #58a6ff; margin: 0 1em; }
</style>
</head>
<body>
<div style="text-align:center">
  <p>Redirecting...</p>
  <p><a href="ko.html">한국어</a> <a href="en.html">English</a></p>
</div>
<script>
  var lang = navigator.language || navigator.userLanguage || '';
  if (lang.startsWith('ko')) {
    location.replace('ko.html');
  } else {
    location.replace('en.html');
  }
</script>
</body>
</html>
